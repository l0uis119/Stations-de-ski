 open:"Déc", created:1946, domain:"130 km (Dolomiti Superski)", anecdote:"La Gran Risa, slalom géant de Coupe du Monde dans les Dolomites, est l'une des pistes les plus techniques du circuit avec ses bosse et sa neige dure. Les refuges d'altitude servent une cuisine italienne étoilée — orecchiette aux truffes à 2500m."},
{id:189,name:"Sestrière",     region:"Italie", massif:"Piémont", alt:2823, lat:44.96, lon:6.88,
 open:"Déc", created:1931, domain:"400 km (Voie Lactée)", anecdote:"Construite en 1931 par Fiat — Giovanni Agnelli père a fait bâtir les deux tours rondes emblématiques pour ses ouvriers. JO Turin 2006. La Via Lattea (Voie Lactée) relie 5 stations franco-italiennes sur 400 km — l'une des plus grandes connexions trans-frontalières."},
{id:190,name:"Bardonecchia",  region:"Italie", massif:"Piémont", alt:2800, lat:45.08, lon:6.70,
 open:"Déc", created:1935, domain:"140 km de pistes", anecdote:"Terminus du tunnel du Fréjus (13 km) qui relie France et Italie depuis 1980. Station olympique de Turin 2006 — les épreuves de slalom géant s'y sont déroulées. Les pistes de Jafferau (2800m) offrent une vue de 360° sur les Alpes franco-italiennes."},
{id:191,name:"Clavière",      region:"Italie", massif:"Piémont", alt:2800, lat:44.94, lon:6.75,
 open:"Déc", created:1898, domain:"400 km (Voie Lactée)", anecdote:"Premier poste de douane italo-français — pendant la 2ème Guerre mondiale, des passeurs faisaient passer des réfugiés juifs par ici vers la Suisse. Le Col de Montgenèvre à 50m de la frontière est le plus facile des Alpes, historiquement le plus emprunté."},
// ── MASSIF CENTRAL ─────────────────────────────────────
{id:200,name:"Super-Besse",   region:"Massif Central", massif:"Auvergne", alt:1350, lat:45.50, lon:2.82,
 open:"Déc", created:1960, domain:"45 km de pistes", anecdote:"Sur les flancs du Puy de la Perdrix face au puy de Sancy. Les volcans éteints du Massif Central créent un paysage de ski unique — nulle part ailleurs en France on ne skie sur un volcan. Le lac Pavin, à 15 minutes, est le lac volcanique le plus récent d'Europe."},
{id:201,name:"Le Mont-Dore",  region:"Massif Central", massif:"Auvergne", alt:1850, lat:45.57, lon:2.80,
 open:"Déc", created:1890, domain:"45 km de pistes", anecdote:"Station thermale depuis les Romains — les Thermes du Mont-Dore datent de 1817, néo-byzantins et baroques, sont classés monument historique. Le Puy de Sancy (1886m), point culminant du Massif Central, est accessible depuis la station en télécabine."},
{id:202,name:"Lioran",        region:"Massif Central", massif:"Cantal", alt:1855, lat:45.11, lon:2.74,
 open:"Déc", created:1938, domain:"60 km de pistes", anecdote:"Sur les flancs du Plomb du Cantal (1855m), stratovolcan érodé. Le tunnel du Lioran, creusé en 1839, fut le premier tunnel ferroviaire de France — exploit technique de l'époque. Fromage Cantal AOP et Salers produits dans les burons autour des pistes."},
{id:203,name:"Laguiole",      region:"Massif Central", massif:"Aubrac", alt:1300, lat:44.68, lon:2.85,
 open:"Déc", created:1968, domain:"20 km de pistes", anecdote:"Sur le plateau de l'Aubrac, paysage de basalte et de landes à perte de vue. La coutelerie Laguiole est née ici en 1829 — les couteaux de poche y sont toujours fabriqués à la main. L'aligot, spécialité aveyronnaise, se mange dans les auberges à la descente des pistes."},
// ── VOSGES & JURA ──────────────────────────────────────
{id:210,name:"La Bresse-Hohneck", region:"Vosges", massif:"Vosges", alt:1366, lat:47.99, lon:6.93,
 open:"Déc", created:1935, domain:"40 km de pistes", anecdote:"Au pied du Hohneck (1363m), point culminant des Vosges. La Bresse est aussi connue pour ses fromages fermiers et ses estaminets. Première station de ski des Vosges, avec ses chaumes (alpages vosgiens) qui donnent un paysage doux et arrondi unique."},
{id:211,name:"Gérardmer",     region:"Vosges", massif:"Vosges", alt:1228, lat:48.07, lon:6.88,
 open:"Déc", created:1878, domain:"45 km de pistes", anecdote:"La Venise des Vosges — le lac de Gérardmer est le plus grand lac naturel de Lorraine. La station a été entièrement détruite en 1944 lors de la retraite allemande — les Vosgiens ont tout reconstruit à partir de rien. Festival du film fantastique mondialement réputé."},
{id:212,name:"Les Rousses",   region:"Jura", massif:"Jura", alt:1670, lat:46.48, lon:6.06,
 open:"Déc", created:1952, domain:"50 km alpin + 200 km nordique", anecdote:"Sur le plateau du Jura suisse à 1100m, Les Rousses forme une station complète avec pistes alpines ET 200 km de ski de fond. Le fort des Rousses, forteresse napoléonienne du 19ème siècle, est désormais une fromagerie à affinage — le Comté y est stocké dans les anciennes casernes."},
{id:213,name:"Métabief",      region:"Jura", massif:"Jura", alt:1423, lat:46.77, lon:6.35,
 open:"Déc", created:1936, domain:"40 km de pistes", anecdote:"Dominant le lac de Saint-Point, le plus grand lac naturel de Franche-Comté. Le mont d'Or (1463m) offre une vue sur les Alpes et le lac Léman par temps clair. La Grande Traversée du Jura (GTJ) passe ici — 450 km de ski nordique de Mandeure à Giron."},
// ── ESPAGNE & ANDORRE ──────────────────────────────────
{id:220,name:"Baqueira Beret", region:"Espagne", massif:"Pyrénées espagnoles", alt:2510, lat:42.69, lon:0.95,
 open:"Déc", created:1964, domain:"167 km de pistes", anecdote:"Station préférée de la famille royale espagnole Juan Carlos I y skia depuis 1964 et a popularisé la station. La Fête de la Saint-Blaise d'Arties est l'un des événements culturels occitans les plus vivants des Pyrénées — la Val d'Aran est officiellement occitanophone."},
{id:221,name:"Sierra Nevada",  region:"Espagne", massif:"Sierra Nevada", alt:3300, lat:37.10, lon:-3.40,
 open:"Déc", created:1964, domain:"110 km de pistes", anecdote:"La station la plus méridionale d'Europe et la plus haute d'Espagne — on peut voir la mer Méditerranée depuis les pistes. À 33 km de Grenade et l'Alhambra. Organisatrice des Championnats du Monde 1996. Arabismes dans les noms de villages alentours."},
{id:222,name:"La Molina",      region:"Espagne", massif:"Pyrénées espagnoles", alt:2537, lat:42.34, lon:1.94,
 open:"Déc", created:1943, domain:"70 km de pistes", anecdote:"Première station de ski d'Espagne, fondée en 1943. Site des premiers Championnats d'Espagne de ski. La Masella voisine permet un domaine combiné exceptionnel avec une des meilleures neiges de Catalogne. Vue sur le massif du Pedraforca."},
{id:223,name:"Masella",        region:"Espagne", massif:"Pyrénées espagnoles", alt:2535, lat:42.35, lon:1.93,
 open:"Déc", created:1973, domain:"70 km (avec La Molina)", anecdote:"Connue pour ses pistes de nuit — ouvertes jusqu'à 22h sur 10 km éclairés. Ambiance barcelonaise le week-end : plus festive et moins chic que les stations françaises voisines. Vue sur le Cadí-Moixeró et la plaine du Segre."},
{id:224,name:"Cerler",         region:"Espagne", massif:"Pyrénées espagnoles", alt:2630, lat:42.60, lon:0.55,
 open:"Déc", created:1972, domain:"80 km de pistes", anecdote:"Station aragonaise perchée à 1500m face aux sommets de l'Aneto (3404m), toit des Pyrénées. Village médiéval de Cerler avec ses ruelles pavées au cœur de la station moderne. L'Espagnol du coin cuisine la migas (chapelure frite) dans les refuges — délicieux après le ski."},
{id:225,name:"Astún",          region:"Espagne", massif:"Pyrénées espagnoles", alt:2200, lat:42.76, lon:-0.52,
 open:"Déc", created:1975, domain:"55 km de pistes", anecdote:"Jumelle de Candanchú, en haut du col du Somport — la frontière franco-espagnole passe au milieu de la vallée. Station de référence des Aragonais avec sa neige sèche. En été, la Route Romane du Somport fait partie du Chemin de Saint-Jacques-de-Compostelle."},
{id:226,name:"Candanchú",      region:"Espagne", massif:"Pyrénées espagnoles", alt:2400, lat:42.77, lon:-0.52,
 open:"Déc", created:1928, domain:"60 km de pistes", anecdote:"La doyenne des stations aragonaises, fondée en 1928. Le col du Somport, à deux pas, était un passage romain stratégique — les légions y ont marché. Les loups ibériques réintroduits dans les Pyrénées espagnoles font parfois leur apparition à cette altitude."},
{id:227,name:"Grandvalira",    region:"Andorre", massif:"Andorre", alt:2640, lat:42.56, lon:1.73,
 open:"Déc", created:1957, domain:"210 km de pistes", anecdote:"Le plus grand domaine skiable des Pyrénées. L'Andorre est une co-principauté indépendante gouvernée conjointement par le Président français et l'Évêque d'Urgell — structure médiévale unique. Shopping hors-taxes attire autant que les pistes."},
{id:228,name:"Vallnord-Pal Arinsal", region:"Andorre", massif:"Andorre", alt:2625, lat:42.58, lon:1.47,
 open:"Déc", created:1960, domain:"65 km de pistes", anecdote:"Vue sur les Pyrénées catalanes et la plaine de la Seu d'Urgell. Pal est plus familial, Arinsal plus orienté jeunes et après-ski animé. L'Andorre, avec ses 468 km², est l'un des plus petits États d'Europe mais possède un des meilleurs rapports neige/accessibilité des Pyrénées."},
// ── JAPON ──────────────────────────────────────────────
{id:300,name:"Niseko",            region:"Japon", massif:"Hokkaido", alt:1308, lat:42.80, lon:140.69,
 open:"Nov", created:1972, domain:"48 km de pistes (4 stations liées)", anecdote:"La Mecque mondiale du ski de poudreuse — Niseko reçoit en moyenne 15 mètres de neige par saison, parmi les plus hautes précipitations neigeuses de la planète. La neige japonaise (Japow) est légendaire : ultra-sèche et légère, elle tombe en quantité sidérante de décembre à mars. Les Australiens ont 'découvert' Niseko dans les années 2000, transformant ce paisible village hokkaïdien en destination internationale. Le Mont Yōtei, volcan parfait visible depuis les pistes, est surnommé le 'Fuji de Hokkaido'."},
{id:301,name:"Furano",            region:"Japon", massif:"Hokkaido", alt:1209, lat:43.35, lon:142.38,
 open:"Nov", created:1962, domain:"30 km de pistes", anecdote:"Furano est la station préférée des Japonais — moins internationale que Niseko, plus authentique. Connue pour ses champs de lavande spectaculaires en été. La neige y est réputée encore plus sèche et légère qu'à Niseko. Accueille régulièrement des épreuves de Coupe du Monde de ski alpin sur ses pentes exigeantes."},
{id:302,name:"Rusutsu",           region:"Japon", massif:"Hokkaido", alt:994, lat:42.74, lon:140.89,
 open:"Nov", created:1966, domain:"42 km de pistes", anecdote:"Station familiale avec un resort hôtelier gigantesque abritant même un parc d'attractions intérieur. La neige poudreuse y est extraordinaire — souvent la première option des familles australiennes après Niseko. Les zones de forêt hors-piste (tree runs) entre les épicéas sont absolument magiques après les chutes."},
{id:303,name:"Hakuba",            region:"Japon", massif:"Alpes japonaises", alt:2696, lat:36.70, lon:137.86,
 open:"Nov", created:1956, domain:"200 km de pistes (11 stations)", anecdote:"Site des JO de Nagano 1998 — les descentes et sauts à ski se disputèrent ici. La vallée de Hakuba regroupe 11 stations distinctes sur 200 km. Située dans les Alpes japonaises de Honshu, la neige est plus humide qu'Hokkaido mais les dénivelés y sont plus impressionnants. Le village conserve son caractère japonais traditionnel malgré l'afflux de visiteurs étrangers."},
{id:304,name:"Nozawa Onsen",      region:"Japon", massif:"Alpes japonaises", alt:1650, lat:36.92, lon:138.45,
 open:"Déc", created:1912, domain:"35 km de pistes", anecdote:"L'une des plus anciennes stations du Japon — les sources chaudes (onsen) en plein village sont gratuites et accessibles à tous depuis des siècles. Les canaux d'eau chaude naturelle chauffent les ruelles du village pour éviter le verglas. La fête du Feu de Dosojin, chaque 15 janvier, est une célébration shinto millénaire classée patrimoine culturel national."},
{id:305,name:"Myoko Kogen",       region:"Japon", massif:"Alpes japonaises", alt:1855, lat:36.87, lon:138.11,
 open:"Déc", created:1931, domain:"70 km de pistes (6 stations)", anecdote:"L'une des zones les plus enneigées du Japon continental — jusqu'à 12 mètres de neige par an. Plusieurs petites stations authentiques avec sources chaudes et ryokans traditionnels. Les flux d'air humide de la mer du Japon déversent ici des quantités phénoménales de neige légère chaque hiver."},
{id:306,name:"Shiga Kogen",       region:"Japon", massif:"Alpes japonaises", alt:2307, lat:36.73, lon:138.52,
 open:"Déc", created:1936, domain:"80 km de pistes (19 stations liées)", anecdote:"Le plus grand domaine skiable du Japon — 19 stations reliées sur un vaste plateau. Site des épreuves de ski alpin des JO de Nagano 1998. Altitude et exposition nord garantissent une neige de qualité exceptionnelle jusqu'en mai. Les macaques japonais se réchauffent dans les sources chaudes à quelques kilomètres des pistes."},
{id:307,name:"Zao Onsen",         region:"Japon", massif:"Tohoku", alt:1841, lat:38.14, lon:140.44,
 open:"Déc", created:1924, domain:"40 km de pistes", anecdote:"Célèbre pour ses 'monstres de neige' (juhyo) — des sapins entièrement enveloppés de glace et de neige qui prennent des formes fantomatiques et sculpturales absolument uniques au monde. Le phénomène est dû aux brumes glacées du volcan Zao combinées aux vents. Un spectacle absolument irréel, souvent éclairé de nuit."},
{id:308,name:"Kiroro",            region:"Japon", massif:"Hokkaido", alt:1180, lat:43.12, lon:141.00,
 open:"Nov", created:1972, domain:"34 km de pistes", anecdote:"Nichée dans une vallée secrète d'Hokkaido, Kiroro est la station qui reçoit le plus de neige au Japon après Niseko. Peu fréquentée par les étrangers, elle est le refuge des puristes de la poudreuse japonaise. Les forêts de bouleaux et d'épicéas givrés créent un décor de conte d'hiver nordique absolument envoûtant."},
{id:309,name:"Tomamu",            region:"Japon", massif:"Hokkaido", alt:1239, lat:43.02, lon:142.79,
 open:"Nov", created:1984, domain:"28 km de pistes", anecdote:"Station connue pour sa 'mer de nuages' — un phénomène météorologique où les nuages s'accumulent dans la vallée à l'aube, créant un lac de brume illuminé par le soleil levant. Un restaurant spécial 'Cloud Walk' permet de prendre le petit-déjeuner au-dessus des nuages. La neige y est parmi les plus fines de tout Hokkaido."},
{id:310,name:"Appi Kogen",        region:"Japon", massif:"Tohoku", alt:1308, lat:39.98, lon:140.96,
 open:"Déc", created:1987, domain:"21 km de pistes", anecdote:"Station resort de luxe dans les montagnes d'Iwate. Loin des circuits touristiques habituels, Appi offre une expérience authentiquement japonaise avec ses hôtels traditionnels et ses sources thermales privées. La neige y est abondante et légère grâce aux influences sibériennes soufflant de la mer du Japon."},
// ── ÉTATS-UNIS ─────────────────────────────────────────
{id:400,name:"Vail",              region:"États-Unis", massif:"Colorado Rockies", alt:3527, lat:39.64, lon:-106.37,
 open:"Nov", created:1962, domain:"2050 ha de pistes", anecdote:"La plus grande station des États-Unis et l'une des plus grandes du monde. Le Back Bowls de Vail — 7 cuvettes hors-piste géantes dans la montagne — représentent à eux seuls plus de terrain que beaucoup de stations européennes entières. Fondée en 1962 par Pete Seibert, vétéran de la 10ème Division de Montagne qui a combattu dans les Apennins italiens."},
{id:401,name:"Aspen",             region:"États-Unis", massif:"Colorado Rockies", alt:3813, lat:39.19, lon:-106.82,
 open:"Nov", created:1947, domain:"500 ha (4 montagnes)", anecdote:"La station la plus célèbre et la plus chic du monde — Hunter S. Thompson y vivait, Jack Nicholson y possède un chalet, les célébrités d'Hollywood envahissent la ville chaque hiver. Aspen possède quatre montagnes distinctes dont le légendaire Ajax Mountain avec ses noires intimidantes. La ville d'Aspen elle-même, victorienne et dorée, est un musée vivant de l'ère minière du Colorado."},
{id:402,name:"Telluride",         region:"États-Unis", massif:"Colorado Rockies", alt:4114, lat:37.94, lon:-107.85,
 open:"Nov", created:1972, domain:"126 km de pistes", anecdote:"Enclavé dans un canyon spectaculaire à 2660m d'altitude, accessible autrefois uniquement par avion ou route de montagne. La ville de Telluride, fondée pendant la ruée vers l'or, possède le plus grand nombre de bâtiments classés par habitant des États-Unis. Les pistes de Revelation Bowl, à 4115m, offrent un des plus beaux panoramas de toutes les Rocheuses."},
{id:403,name:"Park City",         region:"États-Unis", massif:"Utah Wasatch", alt:3048, lat:40.65, lon:-111.50,
 open:"Nov", created:1963, domain:"3240 ha (après fusion PCMR-Canyons)", anecdote:"Le plus grand domaine skiable des États-Unis depuis la fusion avec Canyons Resort. Station des JO de Salt Lake City 2002 — les épreuves de slalom et snowboard s'y sont déroulées. L'Utah Powder — neige sèche et légère grâce au Grand Lac Salé qui crée un effet de lac-effet de neige unique — est réputé comme le meilleur ski alpin des USA."},
{id:404,name:"Alta",              region:"États-Unis", massif:"Utah Wasatch", alt:3216, lat:40.59, lon:-111.64,
 open:"Nov", created:1939, domain:"500 ha de pistes", anecdote:"La station la plus ancienne de l'Utah, fondée en 1939. Alta est l'une des trois dernières stations au monde à interdire les snowboards — règle maintenue farouchement depuis les années 80 malgré plusieurs batailles juridiques. La neige d'Alta est réputée être la meilleure du monde : légère, sèche, abondante — jusqu'à 14 mètres par saison."},
{id:405,name:"Snowbird",          region:"États-Unis", massif:"Utah Wasatch", alt:3352, lat:40.58, lon:-111.66,
 open:"Nov", created:1971, domain:"400 ha de pistes", anecdote:"Voisine d'Alta, reliée depuis 2014. Snowbird est connue pour être la station la plus difficile des États-Unis — 27% de pistes noires et une grande partie de terrain expert. Le tram aérien Snowbird, en service depuis 1971, monte 125 personnes en 8 minutes au Hidden Peak (3352m) — icône absolue du ski américain."},
{id:406,name:"Jackson Hole",      region:"États-Unis", massif:"Wyoming Tetons", alt:3185, lat:43.59, lon:-110.83,
 open:"Nov", created:1965, domain:"1011 ha de pistes", anecdote:"La montagne la plus intimidante des États-Unis — 50% de terrain expert et la légendaire Corbet's Couloir, un couloir dont l'entrée nécessite un saut dans le vide de 3 à 6 mètres suivi d'une pente à 50°. Le parc national de Grand Teton voisin offre un panorama de cathédrale rocheuse absolument incomparable. Les wapitis et bisons paissent en contrebas."},
{id:407,name:"Sun Valley",        region:"États-Unis", massif:"Idaho Sawtooth", alt:2798, lat:43.70, lon:-114.35,
 open:"Nov", created:1936, domain:"800 ha de pistes", anecdote:"Première station de ski construite aux États-Unis en 1936, commandée par le patron de l'Union Pacific Railroad pour attirer les riches voyageurs vers l'Idaho. Ernest Hemingway y a vécu et y est mort en 1961 — sa maison est toujours debout. Inventeur du télésiège — avant Sun Valley, les skieurs montaient dans des bennes à bananes sur rails."},
{id:408,name:"Mammoth Mountain",  region:"États-Unis", massif:"California Sierra Nevada", alt:3369, lat:37.63, lon:-119.03,
 open:"Nov", created:1955, domain:"1500 ha de pistes", anecdote:"La station californienne par excellence — Los Angelenos font 5h de route pour venir ici chaque week-end d'hiver. Mammoth est un volcan endormi (dernière éruption il y a 57 000 ans) avec de la vapeur qui sort encore du sol à certains endroits. La saison peut durer jusqu'en août certaines années grâce à l'altitude et l'orientation nord."},
{id:409,name:"Whistler Blackcomb", region:"États-Unis", massif:"British Columbia Coast", alt:2182, lat:50.12, lon:-122.95,
 open:"Nov", created:1966, domain:"3307 ha de pistes", anecdote:"Le plus grand domaine d'Amérique du Nord combiné. Techniquement au Canada (Colombie-Britannique), mais intégré dans tous les pass américains. Site des JO de Vancouver 2010. Le Peak 2 Peak Gondola, inauguré en 2008, détient plusieurs records mondiaux — 4,4 km de câble, 436m au-dessus de la vallée, deux cabines en verre transparent pour voir le vide."},
{id:410,name:"Steamboat Springs", region:"États-Unis", massif:"Colorado Rockies", alt:3221, lat:40.49, lon:-106.80,
 open:"Nov", created:1963, domain:"880 ha de pistes", anecdote:"Capital mondiale du ski champagne — le 'Champagne Powder' de Steamboat est une marque déposée depuis 1914. La neige y est si légère et sèche qu'elle ressemble à de la poudre à canon. Steamboat a produit plus d'olympiens en ski de fond que n'importe quelle autre ville américaine. Les cow-boys locaux skient encore avec leurs éperons."},
{id:411,name:"Stowe",             region:"États-Unis", massif:"Vermont Green Mountains", alt:1339, lat:44.53, lon:-72.78,
 open:"Nov", created:1937, domain:"485 ha de pistes", anecdote:"La 'reine des stations de l'Est' — Stowe est la station la plus mythique de la côte Est américaine. La famille von Trapp (oui, La Mélodie du Bonheur) a fui l'Autriche nazie en 1938 et a ouvert une auberge ici en 1950, toujours en activité. Le Mt. Mansfield (1339m), point culminant du Vermont, offre une vue jusqu'au Canada par temps clair."},
{id:412,name:"Lake Tahoe (Palisades)", region:"États-Unis", massif:"California/Nevada Sierra Nevada", alt:2761, lat:39.20, lon:-120.24,
 open:"Nov", created:1949, domain:"600 ha de pistes", anecdote:"Anciennement connu sous le nom de Squaw Valley — site des JO d'Hiver 1960. Rebaptisé Palisades Tahoe en 2021 pour effacer le terme offensant 'squaw'. Le lac Tahoe, visible depuis les pistes, est le plus grand lac de montagne des États-Unis — 501m de profondeur, eau cristalline bleue. En bonne année, Tahoe reçoit jusqu'à 20 mètres de neige."},
{id:413,name:"Taos Ski Valley",   region:"États-Unis", massif:"New Mexico Sangre de Cristo", alt:3804, lat:36.60, lon:-105.45,
 open:"Nov", created:1955, domain:"300 ha de pistes", anecdote:"Station fondée par le célèbre skeur suisse Ernie Blake qui, après avoir survolé le Nouveau-Mexique en avion, a lancé une pelle de neige et déclaré 'on skiera ici'. Taos interdit les snowboards jusqu'en 2008 — record de résistance. La culture pueblo des Indiens Taos entoure la station — leur village ancestral, habité depuis 1000 ans, est classé UNESCO."},
{id:414,name:"Big Sky",           region:"États-Unis", massif:"Montana Rockies", alt:3403, lat:45.29, lon:-111.40,
 open:"Nov", created:1974, domain:"2400 ha de pistes", anecdote:"Le plus grand dénivelé continu des États-Unis — 1447m vertical du sommet jusqu'à la base. Big Sky est partenaire avec Moonlight Basin pour former l'un des plus grands domaines d'Amérique du Nord. La faible densité de skieurs (peu de files d'attente) et la neige sèche du Montana en font le secret bien gardé des skieurs qui fuient les foules d'Aspen et Vail."},
{id:415,name:"Breckenridge",      region:"États-Unis", massif:"Colorado Rockies", alt:3914, lat:39.48, lon:-106.07,
 open:"Nov", created:1961, domain:"2358 ha de pistes", anecdote:"La station la plus haute des États-Unis avec son sommet à 3914m — plus haut que le Mont-Blanc. Ancienne ville minière de la ruée vers l'or des années 1860 avec son centre historique victorien impeccablement conservé. Peak 6, ouvert en 2013, a ajouté 250 ha de terrain au-dessus de la limite des arbres avec des panoramas à couper le souffle."},
{id:416,name:"Killington",        region:"États-Unis", massif:"Vermont Green Mountains", alt:1293, lat:43.67, lon:-72.82,
 open:"Oct", created:1958, domain:"486 ha de pistes", anecdote:"La plus grande station de l'Est américain et celle qui ouvre le plus tôt — souvent dès octobre grâce à l'enneigement artificiel le plus avancé au monde. Surnommée 'The Beast of the East'. La K-1 Express Gondola est la plus rapide d'Amérique du Nord. Les fêtes d'après-ski légendaires attirent autant que les pistes."},
{id:417,name:"Keystone",          region:"États-Unis", massif:"Colorado Rockies", alt:3654, lat:39.61, lon:-105.97,
 open:"Oct", created:1970, domain:"800 ha de pistes", anecdote:"Première grande station à proposer du ski de nuit éclairé — 17 pistes illuminées jusqu'à 21h. Réputée familiale et accessible. Le lac Keystone, au pied de la montagne, se transforme en patinoire naturelle en hiver — spectacle unique face aux sommets enneigés du Colorado. Ouvre souvent dès fin octobre."},
{id:418,name:"Crested Butte",     region:"États-Unis", massif:"Colorado Rockies", alt:3707, lat:38.87, lon:-106.99,
 open:"Nov", created:1961, domain:"500 ha de pistes", anecdote:"Capitale mondiale du ski extrême — les couloirs de Crested Butte comme the Headwall, Spellbound Bowl et les faces nord impossibles ont construit une réputation mondiale parmi les skieurs les plus engagés. La ville de Crested Butte, classée National Historic District, est un des derniers vrais villages miniers victoriens intacts du Colorado."},
{id:419,name:"Snowmass",          region:"États-Unis", massif:"Colorado Rockies", alt:3813, lat:39.21, lon:-106.94,
 open:"Nov", created:1967, domain:"800 ha de pistes", anecdote:"Village-station construit ex nihilo à 8km d'Aspen. Le dénivelé vertical de Snowmass (1417m) est le plus grand du Colorado — l'une des grandes descentes d'Amérique. La Elk Camp Gondola dessert un plateau panoramique avec vue sur les Elk Mountains. Base très familiale contrastant avec le glamour d'Aspen toute proche."},
];

// ════════════ AUTH UI ════════════
function switchAuthTab(tab) {
  authTab = tab;
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
  document.getElementById('auth-pw2').style.display = tab==='signup' ? '' : 'none';
  document.getElementById('auth-submit-btn').textContent = tab==='login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('auth-err').textContent = '';
  document.getElementById('auth-ok').textContent = '';
}

async function authSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  const pw2   = document.getElementById('auth-pw2').value;
  const errEl = document.getElementById('auth-err');
  const okEl  = document.getElementById('auth-ok');
  const btn   = document.getElementById('auth-submit-btn');

  errEl.textContent = ''; okEl.textContent = '';
  if (!email || !pw) { errEl.textContent = 'Remplis tous les champs.'; return; }
  if (authTab==='signup' && pw.length < 8) { errEl.textContent = 'Mot de passe trop court (8 caractères min.).'; return; }
  if (authTab==='signup' && pw !== pw2) { errEl.textContent = 'Les mots de passe ne correspondent pas.'; return; }

  btn.disabled = true;
  btn.textContent = '...';

  if (authTab==='login') {
    const { data, error } = await supa.auth.signInWithPassword({ email, password: pw });
    if (error) { errEl.textContent = error.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect.' : error.message; btn.disabled=false; btn.textContent='Se connecter'; return; }
    onSignIn(data.user);
  } else {
    const { data, error } = await supa.auth.signUp({ email, password: pw });
    if (error) { errEl.textContent = error.message; btn.disabled=false; btn.textContent='Créer mon compte'; return; }
    if (data.user && data.session) {
      onSignIn(data.user);
    } else {
      okEl.textContent = 'Compte créé ! Vérifie tes emails pour confirmer.';
      btn.disabled=false; btn.textContent='Créer mon compte';
    }
  }
}

async function onSignIn(user) {
  currentUser = user;
  document.getElementById('auth-overlay').classList.add('hidden');
  const short = user.email.split('@')[0];
  const pill = document.getElementById('user-pill');
  pill.innerHTML = `👤 ${short}`;
  pill.title = `Connecté : ${user.email}\nCliquer pour se déconnecter`;
  await loadFromCloud();
  initMap();
  updateStats();
}

async function signOut() {
  if (!confirm('Se déconnecter ?')) return;
  await supa.auth.signOut();
  currentUser = null;
  visitedIds = new Set();
  staysData = {};
  document.getElementById('user-pill').innerHTML = '';
  // Reset markers
  Object.values(markers).forEach(m => m.setIcon(mkIcon(false)));
  updateStats();
  renderRegionDropdown();
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('auth-pw').value = '';
  document.getElementById('auth-err').textContent = '';
  document.getElementById('auth-ok').textContent = '';
  document.getElementById('auth-submit-btn').disabled = false;
  document.getElementById('auth-submit-btn').textContent = 'Se connecter';
}

// ════════════ CLOUD SYNC ════════════
async function loadFromCloud() {
  const uid = currentUser.id;
  // Load visited
  const { data: vis } = await supa.from('visited_stations').select('station_id').eq('user_id', uid);
  visitedIds = new Set((vis||[]).map(r => r.station_id));
  // Load stays
  const { data: st } = await supa.from('stays').select('*').eq('user_id', uid);
  staysData = {};
  (st||[]).forEach(r => {
    if (!staysData[r.station_id]) staysData[r.station_id] = [];
    staysData[r.station_id].push({ id: r.id, from: r.date_from, to: r.date_to });
  });
  // Update markers if map already inited
  Object.entries(markers).forEach(([id, m]) => {
    m.setIcon(mkIcon(visitedIds.has(parseInt(id))));
  });
  updateStats();
  renderRegionDropdown();
}

async function cloudAddVisited(stationId) {
  if (!currentUser) return;
  await supa.from('visited_stations').upsert({ user_id: currentUser.id, station_id: stationId }, { onConflict: 'user_id,station_id' });
}
async function cloudRemoveVisited(stationId) {
  if (!currentUser) return;
  await supa.from('visited_stations').delete().eq('user_id', currentUser.id).eq('station_id', stationId);
}
async function cloudAddStay(stationId, from, to) {
  if (!currentUser) return null;
  const { data } = await supa.from('stays').insert({ user_id: currentUser.id, station_id: stationId, date_from: from, date_to: to||from }).select().single();
  return data;
}
async function cloudDelStay(stayDbId) {
  if (!currentUser) return;
  await supa.from('stays').delete().eq('id', stayDbId);
}

// ════════════ TOGGLE ════════════
async function toggleStation(id) {
  if (visitedIds.has(id)) {
    visitedIds.delete(id);
    cloudRemoveVisited(id);
  } else {
    visitedIds.add(id);
    cloudAddVisited(id);
    toast('✓ ' + STATIONS.find(s=>s.id===id)?.name);
  }
  updateStats(); renderRegionDropdown();
}

// ════════════ STAYS ════════════
async function addStay() {
  if (!currentSheet) return;
  const from = document.getElementById('stay-from').value;
  const to   = document.getElementById('stay-to').value;
  if (!from) { toast('Indique au moins une date d\'arrivée'); return; }
  const id = currentSheet.id;

  const btn = document.querySelector('.stay-add-btn');
  btn.disabled = true; btn.textContent = '...';

  const row = await cloudAddStay(id, from, to||from);
  if (!staysData[id]) staysData[id] = [];
  staysData[id].push({ id: row?.id, from, to: to||from });
  staysData[id].sort((a,b) => a.from.localeCompare(b.from));

  document.getElementById('stay-from').value = '';
  document.getElementById('stay-to').value = '';
  btn.disabled = false; btn.textContent = '+ Ajouter';

  renderStays(id);
  if (!visitedIds.has(id)) {
    await toggleStation(id);
    const m = markers[id];
    if (m) { m.setIcon(mkIcon(true)); m.setPopupContent(mkMiniPopup(currentSheet)); }
    refreshSheetBtn();
    toast(`✓ ${currentSheet.name} marquée comme visitée`);
  } else {
    toast('Séjour ajouté !');
  }
}

async function delStay(stationId, idx) {
  const stay = staysData[stationId]?.[idx];
  if (!stay) return;
  if (stay.id) await cloudDelStay(stay.id);
  staysData[stationId].splice(idx, 1);
  renderStays(stationId);
}

// ════════════ MAP ════════════
let map, markers={}, tileLayers={}, currentLayer='topo';

const TILE_DEFS={
  topo:      {url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',                                                                     maxZoom:17, filter:'brightness(0.82) saturate(0.75) sepia(0.12)'},
  satellite: {url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',                        maxZoom:19, filter:'brightness(0.88) saturate(0.85)'},
  street:    {url:'https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png',                                                              maxZoom:20, filter:'brightness(0.72) saturate(0.6) sepia(0.18)'},
  winter:    {url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',                                                                   maxZoom:19, filter:'brightness(0.92) saturate(0.15) hue-rotate(180deg) contrast(1.05)'},
};

function initMap(){
  map=L.map('leaflet-map',{center:[45.8,7.5],zoom:7,zoomControl:false,attributionControl:false,maxZoom:20});
  Object.entries(TILE_DEFS).forEach(([key,def])=>{
    tileLayers[key]=L.tileLayer(def.url,{maxZoom:def.maxZoom||19,minZoom:2,maxNativeZoom:def.maxZoom||19});
  });
  tileLayers['topo'].addTo(map);
  applyTileFilter('topo');
  L.control.zoom({position:'bottomleft'}).addTo(map);

  STATIONS.forEach(s=>{
    const m=L.marker([s.lat,s.lon],{icon:mkIcon(visitedIds.has(s.id))})
      .bindPopup(mkMiniPopup(s),{closeButton:false,maxWidth:200})
      .addTo(map);
    m.on('popupopen',()=>{
      document.querySelector('.mini-popup')?.addEventListener('click',()=>{
        map.closePopup();
        openSheet(s);
      });
    });
    markers[s.id]=m;
  });
  renderRegionDropdown();
}

function applyTileFilter(key){
  const pane=document.querySelector('.leaflet-tile-pane');
  if(pane) pane.style.filter=TILE_DEFS[key]?.filter||'';
}

function setLayer(key){
  if(tileLayers[currentLayer]) map.removeLayer(tileLayers[currentLayer]);
  tileLayers[key].addTo(map);
  currentLayer=key;
  applyTileFilter(key);
  document.querySelectorAll('.layer-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('lb-'+key)?.classList.add('active');
}

function mkIcon(v){
  const sz=v?14:9;
  return L.divIcon({
    className:'',
    html:`<div class="ski-marker ${v?'visited':'unvisited'}" style="width:${sz}px;height:${sz}px"></div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
  });
}

function mkMiniPopup(s){
  return `<div class="mini-popup">
    <div class="mini-popup-name">${s.name}</div>
    <div class="mini-popup-meta">${s.massif} · ${s.alt}m</div>
    <div class="mini-popup-hint">→ Cliquer pour voir la fiche</div>
  </div>`;
}

// ════════════ STATION SHEET ════════════
function openSheet(s){
  currentSheet=s;
  document.getElementById('sh-name').textContent=s.name;
  document.getElementById('sh-massif').textContent=`${s.massif} · ${s.region}`;
  document.getElementById('sh-alt').innerHTML=`▲ ${s.alt}m`;
  document.getElementById('sh-anecdote').textContent=s.anecdote||'—';

  // Info grid
  const grid=document.getElementById('sh-info-grid');
  grid.innerHTML=`
    <div class="info-card"><div class="ic-label">Ouverture</div><div class="ic-val">${s.open||'—'}</div></div>
    <div class="info-card"><div class="ic-label">Créée en</div><div class="ic-val">${s.created||'—'}</div></div>
    <div class="info-card" style="grid-column:1/-1"><div class="ic-label">Domaine</div><div class="ic-val">${s.domain||'—'}</div></div>`;

  refreshSheetBtn();
  renderStays(s.id);
  document.getElementById('stay-from').value='';
  document.getElementById('stay-to').value='';
  document.getElementById('station-sheet').classList.add('open');
}

function closeSheet(){
  document.getElementById('station-sheet').classList.remove('open');
  currentSheet=null;
}

function refreshSheetBtn(){
  if(!currentSheet) return;
  const v=visitedIds.has(currentSheet.id);
  const btn=document.getElementById('sh-toggle-btn');
  btn.textContent=v?'✕ Retirer de mes stations':'✓ Marquer comme skié';
  btn.className='sheet-visited-btn '+(v?'remove':'add');
}

function sheetToggle(){
  if(!currentSheet) return;
  toggleStation(currentSheet.id);
  refreshSheetBtn();
  const m=markers[currentSheet.id];
  if(m){m.setIcon(mkIcon(visitedIds.has(currentSheet.id)));m.setPopupContent(mkMiniPopup(currentSheet));}
}

function renderStays(stationId){
  const stays=(staysData[stationId]||[]);
  const el=document.getElementById('sh-stays');
  el.innerHTML='';
  stays.forEach((st,i)=>{
    const item=document.createElement('div');
    item.className='stay-item';
    item.innerHTML=`<span class="stay-dates">📅 ${fmt(st.from)}${st.to&&st.to!==st.from?' → '+fmt(st.to):''}</span>
      <button class="stay-del" onclick="delStay(${stationId},${i})">✕</button>`;
    el.appendChild(item);
  });
  if(!stays.length){
    el.innerHTML='<div style="font-size:11px;color:var(--muted);padding:4px 0">Aucun séjour enregistré</div>';
  }
}

function fmt(d){
  if(!d) return '?';
  const [y,m,day]=d.split('-');
  return `${day}/${m}/${y}`;
}

// ════════════ REGION DROPDOWN ════════════
function renderRegionDropdown(){
  const dd=document.getElementById('region-dropdown');
  dd.innerHTML=`<div class="rd-title">Zone</div>`;
  const all=document.createElement('button');
  all.className='rd-btn active'; all.id='rd-all';
  all.innerHTML=`<span>Tout</span><span class="rd-count">${visitedIds.size}</span>`;
  all.onclick=()=>{setActiveRd(null,'all');map.flyTo([45.8,7.5],6,{duration:1});};
  dd.appendChild(all);
  REGIONS.forEach(r=>{
    const tot=STATIONS.filter(s=>s.region===r).length;
    const done=STATIONS.filter(s=>s.region===r&&visitedIds.has(s.id)).length;
    const b=document.createElement('button');
    b.className='rd-btn'; b.dataset.r=r;
    b.innerHTML=`<span>${r}</span><span class="rd-count">${done}/${tot}</span>`;
    b.onclick=()=>{setActiveRd(r);const bd=REGION_BOUNDS[r];if(bd)map.flyToBounds(bd,{padding:[30,30],duration:1});};
    dd.appendChild(b);
  });
}

function setActiveRd(region,special){
  document.querySelectorAll('.rd-btn').forEach(b=>b.classList.remove('active'));
  if(special==='all') document.getElementById('rd-all')?.classList.add('active');
  else document.querySelector(`.rd-btn[data-r="${region}"]`)?.classList.add('active');
}

function toggleRegionDropdown(){
  document.getElementById('gear-btn').classList.toggle('open');
  document.getElementById('region-dropdown').classList.toggle('open');
}

// ════════════ FUZZY SEARCH ════════════
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function fuzzy(str,q){
  str=norm(str);q=norm(q);
  if(!q) return{ok:true,score:0};
  if(str.includes(q)) return{ok:true,score:100-str.indexOf(q)};
  let qi=0;for(let i=0;i<str.length&&qi<q.length;i++) if(str[i]===q[qi]) qi++;
  return qi===q.length?{ok:true,score:40}:{ok:false,score:0};
}
function hl(text,q){
  if(!q) return text;
  const idx=norm(text).indexOf(norm(q));
  if(idx<0) return text;
  return text.slice(0,idx)+`<mark>${text.slice(idx,idx+q.length)}</mark>`+text.slice(idx+q.length);
}

function renderList(){
  const q=document.getElementById('search-input').value.trim();
  let base=regionFilter==='all'?STATIONS:STATIONS.filter(s=>s.region===regionFilter);
  let res=base.map(s=>{
    const sc=Math.max(fuzzy(s.name,q).score,fuzzy(s.massif,q).score,fuzzy(s.region,q).score);
    const ok=!q||fuzzy(s.name,q).ok||fuzzy(s.massif,q).ok||fuzzy(s.region,q).ok;
    return{s,ok,sc};
  }).filter(r=>r.ok).sort((a,b)=>b.sc-a.sc||a.s.name.localeCompare(b.s.name));

  document.getElementById('res-info').textContent=`${res.length} station${res.length>1?'s':''}`;
  const list=document.getElementById('station-list');
  list.innerHTML='';
  res.slice(0,150).forEach(({s})=>{
    const v=visitedIds.has(s.id);
    const stays=(staysData[s.id]||[]).length;
    const el=document.createElement('div');
    el.className='s-item'+(v?' visited':'');
    el.innerHTML=`<div>
      <div class="s-name">${hl(s.name,q)}</div>
      <div class="s-meta">${s.massif} · ${s.region} · ${s.alt}m${stays?' · '+stays+' séjour'+(stays>1?'s':''):''}
      </div></div>
      <div class="s-check"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1.5 5l2.5 2.5 4.5-4"/></svg></div>`;
    el.onclick=()=>{
      toggleStation(s.id);
      el.classList.toggle('visited',visitedIds.has(s.id));
      const m=markers[s.id];if(m){m.setIcon(mkIcon(visitedIds.has(s.id)));m.setPopupContent(mkMiniPopup(s));}
    };
    list.appendChild(el);
  });
  if(res.length>150){const m=document.createElement('div');m.style.cssText='text-align:center;color:var(--muted);font-size:11px;padding:14px';m.textContent=`+${res.length-150} stations, affinez la recherche`;list.appendChild(m);}
}

function initFilters(){
  const row=document.getElementById('filter-row');row.innerHTML='';
  const mk=(lbl,val)=>{const b=document.createElement('button');b.className='filter-chip'+(regionFilter===val?' active':'');b.textContent=lbl;b.onclick=()=>{regionFilter=val;initFilters();renderList();};row.appendChild(b);};
  mk('Tout','all');REGIONS.forEach(r=>mk(r,r));
}

// ════════════ DONE LIST ════════════
function renderDoneList(){
  const visited=STATIONS.filter(s=>visitedIds.has(s.id));
  document.getElementById('list-sub').textContent=`${visited.length} station${visited.length>1?'s':''} visitée${visited.length>1?'s':''}`;
  const el=document.getElementById('done-list');
  if(!visited.length){el.innerHTML=`<div class="empty"><div class="empty-icon">⛷️</div><div class="empty-title">Aucune station encore</div><div class="empty-sub">Va dans "Ajouter" pour commencer</div></div>`;return;}
  const byR={};visited.forEach(s=>{(byR[s.region]=byR[s.region]||[]).push(s);});
  el.innerHTML='';
  Object.entries(byR).forEach(([r,ss])=>{
    const lbl=document.createElement('div');lbl.className='group-label';
    lbl.innerHTML=`${r} <span style="color:var(--accent)">${ss.length}</span>`;el.appendChild(lbl);
    ss.sort((a,b)=>a.name.localeCompare(b.name)).forEach(s=>{
      const stays=(staysData[s.id]||[]).length;
      const item=document.createElement('div');item.className='d-item';
      item.innerHTML=`<div>
        <div class="d-name">${s.name}</div>
        <div class="d-meta">${s.massif} · ${s.alt}m</div>
        ${stays?`<div class="d-stays">⛷ ${stays} séjour${stays>1?'s':''}</div>`:''}
      </div>
      <button class="del-btn" title="Retirer"><svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 1l8 8M9 1L1 9"/></svg></button>`;
      item.querySelector('.del-btn').onclick=e=>{e.stopPropagation();toggleStation(s.id);updateStats();const m=markers[s.id];if(m){m.setIcon(mkIcon(false));m.setPopupContent(mkMiniPopup(s));}renderDoneList();renderRegionDropdown();};
      item.onclick=(e)=>{if(e.target.closest('.del-btn')) return;showPage('map');setTimeout(()=>{map.setView([s.lat,s.lon],12);const m=markers[s.id];if(m)m.openPopup();},200);};
      el.appendChild(item);
    });
  });
}

// ════════════ STATS ════════════
function updateStats(){
  const n=visitedIds.size;
  document.getElementById('stats-pill').innerHTML=`<strong>${n}</strong> station${n>1?'s':''}`;
}

// ════════════ PAGES ════════════
function showPage(name){
  closeMenu();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('[id^="mi-"]').forEach(m=>m.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('mi-'+name).classList.add('active');
  if(name==='map'){setTimeout(()=>map.invalidateSize(),60);renderRegionDropdown();}
  if(name==='add'){initFilters();renderList();}
  if(name==='list') renderDoneList();
}

// ════════════ MENUS ════════════
function toggleMenu(){
  document.getElementById('burger').classList.toggle('open');
  document.getElementById('nav-menu').classList.toggle('open');
}
function closeMenu(){
  document.getElementById('burger').classList.remove('open');
  document.getElementById('nav-menu').classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#burger')&&!e.target.closest('#nav-menu')) closeMenu();
  if(!e.target.closest('#gear-btn')&&!e.target.closest('#region-dropdown')){
    document.getElementById('gear-btn').classList.remove('open');
    document.getElementById('region-dropdown').classList.remove('open');
  }
});

// ════════════ TOAST ════════════
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ════════════ INIT ════════════
window.addEventListener('DOMContentLoaded', async () => {
  // Check if already logged in
  const { data: { session } } = await supa.auth.getSession();
  if (session?.user) {
    await onSignIn(session.user);
  } else {
    initMap();
    updateStats();
  }
  // Listen for auth changes
  supa.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user && !currentUser) {
      await onSignIn(session.user);
    }
  });
});
</script>
